services:
  - type: web
    name: duc-panel
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build && npm run db:seed
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/opt/render/project/data/duck.db
      - key: UPLOAD_DIR
        value: /opt/render/project/uploads
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
    disk:
      name: duck-data
      mountPath: /opt/render/project/data
      sizeGB: 1
