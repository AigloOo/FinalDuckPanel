databases:
  - name: duc-panel-db
    plan: starter

services:
  - type: web
    name: duc-panel
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: duc-panel-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /opt/render/project/uploads
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
    disk:
      name: duck-data
      mountPath: /opt/render/project/data
      sizeGB: 1
